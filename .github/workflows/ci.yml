name: CI

permissions:
  contents: read

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      # Report every version's result instead of cancelling siblings on the
      # first failure, so a version-specific break is visible in one run.
      fail-fast: false
      matrix:
        # Covers the engines floor (>=20) and the newer active LTS lines.
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check || npm run format
      - run: npm test
      - run: npm run build
      - run: npm run docs:check

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Generate and upload the SBOM as a build artifact.
      - run: npm run sbom
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/bom.json
      # Fail CI on disallowed vulnerability severities (high/critical).
      - run: npm audit --audit-level=high
      # Enforce license allowlist/denylist.
      - run: npm run license-check
