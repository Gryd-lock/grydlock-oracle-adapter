name: Docs

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

# Allow this workflow to publish to GitHub Pages via the deploy-pages action.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let a newer run supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Fails if any exported symbol is missing a doc comment (treatWarningsAsErrors).
      - run: npm run docs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
